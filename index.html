<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Bunga & Nate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;700;900&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #060608;
      --surface: #0d0d14;
      --surface2: #13131e;
      --neon-pink: #ff2d78;
      --neon-cyan: #00f5ff;
      --neon-purple: #b44fff;
      --neon-gold: #ffd166;
      --bunga-bubble: rgba(255, 45, 120, 0.10);
      --bunga-border: rgba(255, 45, 120, 0.35);
      --bunga-glow: rgba(255, 45, 120, 0.18);
      --nate-bubble: rgba(0, 245, 255, 0.07);
      --nate-border: rgba(0, 245, 255, 0.28);
      --nate-glow: rgba(0, 245, 255, 0.14);
      --text: #f0eaf8;
      --text-dim: rgba(240, 234, 248, 0.38);
      --font-display: 'Unbounded', sans-serif;
      --font-body: 'Space Grotesk', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      font-family: var(--font-body);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      position: relative;
    }

    /* === BACKGROUND FX === */
    body::before {
      content: "";
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 50% at 15% 5%, rgba(180,79,255,0.13) 0%, transparent 60%),
        radial-gradient(ellipse 60% 45% at 88% 95%, rgba(255,45,120,0.11) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(0,245,255,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Noise overlay */
    body::after {
      content: "";
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.5;
    }

    /* === HEADER === */
    .app-header {
      flex-shrink: 0;
      position: relative; z-index: 10;
      padding: 14px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid rgba(180,79,255,0.18);
      background: rgba(6,6,8,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .header-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .header-label {
      font-family: var(--font-display);
      font-size: 0.52rem;
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--neon-purple);
      opacity: 0.7;
    }

    .header-title {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1;
      background: linear-gradient(90deg, var(--neon-pink) 0%, var(--neon-purple) 50%, var(--neon-cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 12px rgba(255,45,120,0.4));
    }

    /* === CHAT AREA === */
    #chat-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 14px 14px 8px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      scroll-behavior: smooth;
      position: relative; z-index: 1;
      -webkit-overflow-scrolling: touch;
    }

    #chat-area::-webkit-scrollbar { width: 2px; }
    #chat-area::-webkit-scrollbar-track { background: transparent; }
    #chat-area::-webkit-scrollbar-thumb { 
      background: linear-gradient(180deg, var(--neon-pink), var(--neon-purple));
      border-radius: 2px;
    }

    /* === DATE DIVIDER === */
    .date-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 16px 0 8px;
      color: var(--text-dim);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .date-divider::before,
    .date-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(180,79,255,0.2), transparent);
    }

    .date-divider span {
      white-space: nowrap;
      padding: 3px 12px;
      background: rgba(180,79,255,0.08);
      border-radius: 20px;
      border: 1px solid rgba(180,79,255,0.18);
      font-family: var(--font-display);
      font-weight: 300;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
    }

    /* === BUBBLE === */
    .bubble-row { 
      display: flex; 
      margin-bottom: 2px;
      animation: fadeUp 0.25s ease-out both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bubble-row.bunga { justify-content: flex-start; }
    .bubble-row.nate  { justify-content: flex-end; }

    .bubble {
      max-width: 72%;
      padding: 10px 14px 8px;
      border-radius: 16px;
      line-height: 1.5;
      font-size: 0.88rem;
      word-break: break-word;
      position: relative;
      transition: box-shadow 0.2s;
    }

    .bubble-row.bunga .bubble {
      background: var(--bunga-bubble);
      border: 1px solid var(--bunga-border);
      border-bottom-left-radius: 3px;
      box-shadow: 0 0 16px var(--bunga-glow), inset 0 0 20px rgba(255,45,120,0.04);
    }

    .bubble-row.nate .bubble {
      background: var(--nate-bubble);
      border: 1px solid var(--nate-border);
      border-bottom-right-radius: 3px;
      box-shadow: 0 0 16px var(--nate-glow), inset 0 0 20px rgba(0,245,255,0.03);
    }

    /* Sender name label */
    .bubble-sender {
      font-family: var(--font-display);
      font-size: 0.52rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 4px;
      display: block;
    }

    .bubble-row.bunga .bubble-sender { color: var(--neon-pink); }
    .bubble-row.nate  .bubble-sender { color: var(--neon-cyan); }

    .bubble-text { 
      color: var(--text);
      font-weight: 300;
    }

    /* Image in bubble */
    .bubble-image {
      max-width: 100%;
      max-height: 220px;
      width: auto;
      border-radius: 10px;
      display: block;
      margin-top: 2px;
      cursor: pointer;
      transition: filter 0.2s;
    }

    .bubble-image:hover { filter: brightness(1.08); }

    .bubble-time {
      font-size: 0.6rem;
      color: var(--text-dim);
      margin-top: 5px;
      text-align: right;
      font-family: var(--font-display);
      font-weight: 300;
      letter-spacing: 0.04em;
    }

    /* === EMPTY STATE === */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--text-dim);
      text-align: center;
      padding: 40px;
    }

    .empty-icon {
      font-size: 2.4rem;
      filter: drop-shadow(0 0 20px var(--neon-pink));
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 20px var(--neon-pink)); }
      50%       { filter: drop-shadow(0 0 40px var(--neon-purple)); }
    }

    .empty-text {
      font-family: var(--font-display);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.5;
    }

    /* === INPUT AREA === */
    .input-area {
      flex-shrink: 0;
      position: relative; z-index: 10;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid rgba(180,79,255,0.15);
      background: rgba(6,6,8,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .input-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #msg-input {
      resize: none;
      border: 1px solid rgba(180,79,255,0.25);
      border-radius: 12px;
      padding: 10px 14px;
      font-family: var(--font-body);
      font-size: 0.88rem;
      font-weight: 300;
      color: var(--text);
      background: rgba(13,13,20,0.9);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      max-height: 100px;
      line-height: 1.45;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    #msg-input:focus {
      border-color: rgba(180,79,255,0.5);
      box-shadow: 0 0 0 2px rgba(180,79,255,0.1), 0 0 16px rgba(180,79,255,0.08);
    }

    #msg-input::placeholder { 
      color: var(--text-dim);
      font-style: italic;
    }

    /* Image preview strip */
    #image-preview-wrap {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }

    #image-preview-wrap.visible { display: flex; }

    #image-preview {
      width: 52px; height: 52px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid rgba(255,45,120,0.35);
      box-shadow: 0 0 10px rgba(255,45,120,0.2);
    }

    .btn-clear-img {
      background: rgba(255,45,120,0.15);
      border: 1px solid rgba(255,45,120,0.3);
      color: var(--neon-pink);
      border-radius: 50%;
      width: 22px; height: 22px;
      font-size: 0.7rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .btn-clear-img:hover { background: rgba(255,45,120,0.3); }

    /* Right side buttons */
    .input-right {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex-shrink: 0;
    }

    /* Image attach button */
    .btn-attach {
      width: 36px; height: 36px;
      background: rgba(255,209,102,0.08);
      border: 1px solid rgba(255,209,102,0.25);
      border-radius: 10px;
      color: var(--neon-gold);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      transition: background 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
      align-self: flex-end;
    }

    .btn-attach:hover { background: rgba(255,209,102,0.15); box-shadow: 0 0 12px rgba(255,209,102,0.2); }
    .btn-attach:active { transform: scale(0.93); }

    /* Send buttons */
    .send-buttons {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .btn-send {
      border: 1px solid transparent;
      border-radius: 10px;
      cursor: pointer;
      font-family: var(--font-display);
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 8px 11px;
      transition: transform 0.1s, box-shadow 0.15s;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      text-transform: uppercase;
    }

    .btn-send:active { transform: scale(0.93); }

    .btn-send.bunga {
      background: linear-gradient(135deg, rgba(255,45,120,0.18), rgba(180,79,255,0.14));
      border-color: rgba(255,45,120,0.4);
      color: var(--neon-pink);
      box-shadow: 0 0 14px rgba(255,45,120,0.15);
    }

    .btn-send.bunga:hover {
      box-shadow: 0 0 20px rgba(255,45,120,0.3);
      background: linear-gradient(135deg, rgba(255,45,120,0.28), rgba(180,79,255,0.2));
    }

    .btn-send.nate {
      background: linear-gradient(135deg, rgba(0,245,255,0.10), rgba(180,79,255,0.10));
      border-color: rgba(0,245,255,0.3);
      color: var(--neon-cyan);
      box-shadow: 0 0 14px rgba(0,245,255,0.1);
    }

    .btn-send.nate:hover {
      box-shadow: 0 0 20px rgba(0,245,255,0.25);
      background: linear-gradient(135deg, rgba(0,245,255,0.18), rgba(180,79,255,0.14));
    }

    /* === LOADING === */
    #loading-screen {
      position: fixed; inset: 0; z-index: 100;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      transition: opacity 0.5s ease;
    }

    #loading-screen.hidden { opacity: 0; pointer-events: none; }

    .loading-title {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 900;
      background: linear-gradient(90deg, var(--neon-pink), var(--neon-purple), var(--neon-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(255,45,120,0.5));
      letter-spacing: 0.04em;
    }

    .loading-bar-wrap {
      width: 160px;
      height: 2px;
      background: rgba(180,79,255,0.15);
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-bar {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan));
      border-radius: 2px;
      animation: loadSlide 1.2s ease-in-out infinite;
    }

    @keyframes loadSlide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    /* === IMAGE LIGHTBOX === */
    #lightbox {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.88);
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
    }

    #lightbox.active { display: flex; }

    #lightbox img {
      max-width: 92vw;
      max-height: 88vh;
      border-radius: 12px;
      border: 1px solid rgba(180,79,255,0.3);
      box-shadow: 0 0 60px rgba(180,79,255,0.25);
    }

    #lightbox-close {
      position: absolute;
      top: 20px; right: 20px;
      background: rgba(255,45,120,0.15);
      border: 1px solid rgba(255,45,120,0.4);
      color: var(--neon-pink);
      font-size: 1.2rem;
      width: 38px; height: 38px;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* === UPLOAD PROGRESS === */
    .upload-indicator {
      font-family: var(--font-display);
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--neon-gold);
      opacity: 0.75;
      padding: 2px 0;
      display: none;
    }

    .upload-indicator.visible { display: block; }

    @media (max-width: 380px) {
      .bubble { max-width: 82%; font-size: 0.84rem; }
      .btn-send { font-size: 0.52rem; padding: 7px 9px; }
    }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loading-screen">
    <div class="loading-title">Bunga & Nate</div>
    <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox">
    <img id="lightbox-img" src="" alt="">
    <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  </div>

  <!-- Header -->
  <header class="app-header">
    <div class="header-inner">
      <span class="header-label">private chat</span>
      <div class="header-title">Bunga &amp; Nate ✦</div>
    </div>
  </header>

  <!-- Chat -->
  <div id="chat-area"></div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-left">
      <div id="image-preview-wrap">
        <img id="image-preview" src="" alt="preview">
        <button class="btn-clear-img" onclick="clearImage()" title="Hapus gambar">✕</button>
        <span id="upload-status" class="upload-indicator"></span>
      </div>
      <textarea id="msg-input" rows="1" placeholder="tulis sesuatu…"
        oninput="autoResize(this)"
        onkeydown="handleKey(event)"></textarea>
    </div>
    <div class="input-right">
      <button class="btn-attach" onclick="document.getElementById('img-file').click()" title="Kirim gambar">📎</button>
      <input type="file" id="img-file" accept="image/*" style="display:none" onchange="handleImageSelect(event)">
      <div class="send-buttons">
        <button class="btn-send bunga" onclick="sendMessage('bunga')">Bunga 🌸</button>
        <button class="btn-send nate"  onclick="sendMessage('nate')">Nate 🖤</button>
      </div>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

  <script>
    // ─── Firebase Init ────────────────────────────────
    firebase.initializeApp({
      apiKey: "AIzaSyBGkHHuOgAL9yHGRkQguOWPI8ZW8tx9HDE",
      authDomain: "bunganate.firebaseapp.com",
      databaseURL: "https://bunganate-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "bunganate",
      storageBucket: "bunganate.firebasestorage.app",
      messagingSenderId: "268200099439",
      appId: "1:268200099439:web:21d8bf48b3ab76857dd79a",
      measurementId: "G-7K9K98G8DQ"
    });

    var db       = firebase.database();
    var storage  = firebase.storage();
    var messagesRef = db.ref("messages");

    // ─── State ───────────────────────────────────────
    var selectedImageFile  = null;
    var selectedImageB64   = null;
    var isFirstLoad        = true;

    // ─── Utils ───────────────────────────────────────
    function formatTime(ts) {
      return new Date(ts).toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit" });
    }

    function formatDate(dateStr) {
      var parts = dateStr.split("-");
      var d = new Date(+parts[0], +parts[1] - 1, +parts[2]);
      var today = new Date().toISOString().slice(0, 10);
      var yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
      var yestStr = yesterday.toISOString().slice(0, 10);
      if (dateStr === today)   return "Hari ini";
      if (dateStr === yestStr) return "Kemarin";
      return d.toLocaleDateString("id-ID", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
    }

    function getDateKey(ts) {
      return new Date(ts).toISOString().slice(0, 10);
    }

    function escapeHtml(t) {
      return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
    }

    function autoResize(el) {
      el.style.height = "auto";
      el.style.height = el.scrollHeight + "px";
    }

    function handleKey(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        // do nothing on Enter (mobile UX); user taps button
      }
    }

    function scrollToBottom(smooth) {
      var ca = document.getElementById("chat-area");
      ca.scrollTo({ top: ca.scrollHeight, behavior: smooth ? "smooth" : "instant" });
    }

    // ─── Hide loading screen ─────────────────────────
    function hideLoading() {
      if (!isFirstLoad) return;
      isFirstLoad = false;
      var ls = document.getElementById("loading-screen");
      ls.classList.add("hidden");
      setTimeout(function(){ ls.style.display = "none"; }, 600);
    }

    // Timeout fallback: force hide after 5s no matter what
    setTimeout(hideLoading, 5000);

    // ─── Render ──────────────────────────────────────
    function renderMessages(msgs) {
      var chatArea = document.getElementById("chat-area");

      if (!msgs.length) {
        chatArea.innerHTML = '<div class="empty-state"><div class="empty-icon">✦</div><div class="empty-text">Belum ada pesan</div></div>';
        hideLoading();
        return;
      }

      // group by date
      var byDate = {};
      msgs.forEach(function(m) {
        var dk = getDateKey(m.timestamp);
        if (!byDate[dk]) byDate[dk] = [];
        byDate[dk].push(m);
      });

      var sortedDates = Object.keys(byDate).sort();
      chatArea.innerHTML = "";

      sortedDates.forEach(function(dk) {
        // date divider
        var div = document.createElement("div");
        div.className = "date-divider";
        div.innerHTML = "<span>" + formatDate(dk) + "</span>";
        chatArea.appendChild(div);

        byDate[dk].forEach(function(msg) {
          var who = msg.sender === "bunga" ? "bunga" : "nate";
          var row = document.createElement("div");
          row.className = "bubble-row " + who;

          var innerContent = "";
          // sender name
          var senderLabel = who === "bunga" ? "Bunga 🌸" : "Nate 🖤";
          innerContent += '<span class="bubble-sender">' + senderLabel + '</span>';

          // image?
          if (msg.imageUrl) {
            innerContent += '<img class="bubble-image" src="' + msg.imageUrl + '" alt="gambar" loading="lazy" onclick="openLightbox(\'' + msg.imageUrl + '\')">';
          }

          // text?
          if (msg.text) {
            innerContent += '<div class="bubble-text">' + escapeHtml(msg.text) + '</div>';
          }

          innerContent += '<div class="bubble-time">' + formatTime(msg.timestamp) + '</div>';
          row.innerHTML = '<div class="bubble">' + innerContent + '</div>';
          chatArea.appendChild(row);
        });
      });

      // scroll
      if (isFirstLoad) {
        scrollToBottom(false);
        hideLoading();
      } else {
        scrollToBottom(true);
      }
    }

    // ─── Firebase listener ───────────────────────────
    messagesRef.orderByChild("timestamp").on("value", function(snapshot) {
      var msgs = [];
      snapshot.forEach(function(child) {
        var v = child.val();
        v.id  = child.key;
        msgs.push(v);
      });
      renderMessages(msgs);
    });

    // ─── Image select ────────────────────────────────
    function handleImageSelect(e) {
      var file = e.target.files[0];
      if (!file) return;
      if (file.size > 10 * 1024 * 1024) {
        alert("Ukuran gambar maksimal 10MB");
        return;
      }
      selectedImageFile = file;
      var reader = new FileReader();
      reader.onload = function(ev) {
        selectedImageB64 = ev.target.result;
        document.getElementById("image-preview").src = selectedImageB64;
        document.getElementById("image-preview-wrap").classList.add("visible");
      };
      reader.readAsDataURL(file);
      // reset input so same file can be re-selected
      e.target.value = "";
    }

    function clearImage() {
      selectedImageFile = null;
      selectedImageB64  = null;
      document.getElementById("image-preview").src = "";
      document.getElementById("image-preview-wrap").classList.remove("visible");
      setUploadStatus(false);
    }

    function setUploadStatus(visible, text) {
      var el = document.getElementById("upload-status");
      el.textContent = text || "";
      el.classList.toggle("visible", !!visible);
    }

    // ─── Send ────────────────────────────────────────
    function sendMessage(sender) {
      var input = document.getElementById("msg-input");
      var text  = input.value.trim();

      if (!text && !selectedImageFile) return;

      // disable buttons during send
      setBusy(true);

      if (selectedImageFile) {
        // upload image to Firebase Storage first
        setUploadStatus(true, "mengunggah…");
        var imgRef = storage.ref("chat-images/" + Date.now() + "_" + selectedImageFile.name);
        imgRef.put(selectedImageFile).then(function(snap) {
          return snap.ref.getDownloadURL();
        }).then(function(url) {
          pushMessage(sender, text, url);
        }).catch(function(err) {
          console.error(err);
          alert("Gagal mengunggah gambar. Coba lagi.");
          setBusy(false);
          setUploadStatus(false);
        });
      } else {
        pushMessage(sender, text, null);
      }

      input.value = "";
      input.style.height = "auto";
    }

    function pushMessage(sender, text, imageUrl) {
      var payload = { sender: sender, timestamp: Date.now() };
      if (text)     payload.text     = text;
      if (imageUrl) payload.imageUrl = imageUrl;

      messagesRef.push(payload).then(function() {
        setBusy(false);
        setUploadStatus(false);
        clearImage();
      }).catch(function(err) {
        console.error(err);
        setBusy(false);
        setUploadStatus(false);
      });
    }

    function setBusy(busy) {
      document.querySelectorAll(".btn-send").forEach(function(b) {
        b.disabled = busy;
        b.style.opacity = busy ? "0.45" : "1";
      });
    }

    // ─── Lightbox ────────────────────────────────────
    function openLightbox(src) {
      document.getElementById("lightbox-img").src = src;
      document.getElementById("lightbox").classList.add("active");
    }

    function closeLightbox() {
      document.getElementById("lightbox").classList.remove("active");
      document.getElementById("lightbox-img").src = "";
    }

    document.getElementById("lightbox").addEventListener("click", function(e) {
      if (e.target === this) closeLightbox();
    });

    // ─── Keyboard handling (mobile) ──────────────────
    // Resize chat area when keyboard opens on mobile
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", function() {
        // small delay to let layout settle
        setTimeout(function() {
          var chatArea = document.getElementById("chat-area");
          var atBottom = chatArea.scrollHeight - chatArea.scrollTop - chatArea.clientHeight < 80;
          if (atBottom) scrollToBottom(false);
        }, 100);
      });
    }
  </script>
</body>
</html>
